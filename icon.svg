<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- App icon shell -->
  <rect width="512" height="512" rx="96" fill="#181818" />
  <!-- Green progress: from 12 o'clock clockwise to ~4:30 (~135°) -->
  <circle
    cx="256"
    cy="256"
    r="150"
    fill="none"
    stroke="#2c9323"
    stroke-width="54"
    stroke-linecap="butt"
    transform="rotate(-90 256 256)"
    stroke-dasharray="353.43 942.48"
  />
  <!-- White tick marks (12 × 30°) in the ring band -->
  <g fill="#ffffff" transform="translate(256 256)">
    <rect x="-3.2" y="-168" width="6.4" height="30" rx="1.2" transform="rotate(0)" />
    <rect x="-3.2" y="-168" width="6.4" height="30" rx="1.2" transform="rotate(30)" />
    <rect x="-3.2" y="-168" width="6.4" height="30" rx="1.2" transform="rotate(60)" />
    <rect x="-3.2" y="-168" width="6.4" height="30" rx="1.2" transform="rotate(90)" />
    <rect x="-3.2" y="-168" width="6.4" height="30" rx="1.2" transform="rotate(120)" />
    <rect x="-3.2" y="-168" width="6.4" height="30" rx="1.2" transform="rotate(150)" />
    <rect x="-3.2" y="-168" width="6.4" height="30" rx="1.2" transform="rotate(180)" />
    <rect x="-3.2" y="-168" width="6.4" height="30" rx="1.2" transform="rotate(210)" />
    <rect x="-3.2" y="-168" width="6.4" height="30" rx="1.2" transform="rotate(240)" />
    <rect x="-3.2" y="-168" width="6.4" height="30" rx="1.2" transform="rotate(270)" />
    <rect x="-3.2" y="-168" width="6.4" height="30" rx="1.2" transform="rotate(300)" />
    <rect x="-3.2" y="-168" width="6.4" height="30" rx="1.2" transform="rotate(330)" />
  </g>
  <!-- Inner disc -->
  <circle cx="256" cy="256" r="123" fill="#181818" />
  <text
    x="256"
    y="256"
    fill="#ffffff"
    font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="78"
    font-weight="700"
    letter-spacing="-0.06em"
    text-anchor="middle"
    dominant-baseline="central"
  >WT</text>
</svg>
