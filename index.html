<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <script>
    (function () {
      if (window.navigator.standalone || window.matchMedia("(display-mode: standalone)").matches) {
        document.documentElement.classList.add("is-standalone");
      }
    })();
  </script>
  <!-- Must match theme.css shell exactly — avoids reflow when the stylesheet applies. -->
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }
    html {
      background-color: #1a1817;
      color-scheme: dark;
      width: 100%;
      max-width: 100%;
      height: 100%;
      height: -webkit-fill-available;
      overflow: hidden;
      overflow-x: hidden;
      overscroll-behavior: none;
    }
    body {
      margin: 0;
      width: 100%;
      max-width: 100%;
      background-color: #1a1817;
      position: fixed;
      top: constant(safe-area-inset-top, 0px);
      top: env(safe-area-inset-top, 0px);
      right: constant(safe-area-inset-right, 0px);
      right: env(safe-area-inset-right, 0px);
      bottom: constant(safe-area-inset-bottom, 0px);
      bottom: env(safe-area-inset-bottom, 0px);
      left: constant(safe-area-inset-left, 0px);
      left: env(safe-area-inset-left, 0px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px;
      overflow: hidden;
      overflow-x: hidden;
      overscroll-behavior: none;
      font-family: Inter, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: #e8e8e8;
    }
    html.is-standalone body {
      bottom: max(34px, env(safe-area-inset-bottom, 0px));
    }
    @media (display-mode: standalone) {
      body {
        bottom: max(34px, env(safe-area-inset-bottom, 0px));
      }
    }
    main.app {
      position: relative;
      flex-shrink: 0;
      margin: 0;
      background-color: #1a1817;
    }
  </style>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="color-scheme" content="dark" />
  <meta name="theme-color" content="#1a1817" />
  <meta name="description" content="A simple workout and rest interval timer." />
  <meta name="application-name" content="Workout Timer" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Workout Timer" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <title>Workout Timer</title>
  <link rel="stylesheet" href="theme.css" />
</head>
<body class="phase-workout">
  <main class="app">
    <section id="timer" class="timer workout">
      <div class="ring" id="ring">
        <svg class="ring-svg" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
          <circle class="ring-track" cx="50" cy="50" r="44" />
          <circle
            class="ring-prog"
            id="ringProgress"
            cx="50"
            cy="50"
            r="44"
            transform="rotate(-90 50 50)"
          />
        </svg>
      </div>
      <div class="ticks"></div>
      <div class="center" id="seconds">40</div>
    </section>
    <div class="meta" id="phaseLabel">Workout</div>

    <section class="controls">
      <div class="durations">
        <label>
          Workout (sec)
          <div class="field-stepper">
            <button type="button" class="stepper-btn" id="workoutMinus" aria-label="Decrease workout by 5 seconds">−</button>
            <input id="workoutInput" type="number" min="5" value="40" inputmode="numeric" />
            <button type="button" class="stepper-btn" id="workoutPlus" aria-label="Increase workout by 5 seconds">+</button>
          </div>
        </label>
        <label>
          Rest (sec)
          <div class="field-stepper">
            <button type="button" class="stepper-btn" id="restMinus" aria-label="Decrease rest by 5 seconds">−</button>
            <input id="restInput" type="number" min="5" value="20" inputmode="numeric" />
            <button type="button" class="stepper-btn" id="restPlus" aria-label="Increase rest by 5 seconds">+</button>
          </div>
        </label>
      </div>
      <div class="buttons">
        <button id="startBtn" type="button">Start</button>
        <button id="resetBtn" type="button">Reset</button>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
