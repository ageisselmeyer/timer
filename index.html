<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1a1817" />
  <meta name="description" content="A simple workout and rest interval timer." />
  <meta name="application-name" content="Workout Timer" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Workout Timer" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <title>Workout Timer</title>
  <style>
    :root {
      --text: #111;
      /* Page background for the workout phase; band color is the timer ring only. */
      --kettlebell-black: #1a1817;
      --browser-ui-kettlebell: var(--kettlebell-black);
      --workout-accent: #000000;
      --workout-accent-rgb: 0 0 0;
      /* Constant light grey across palette swaps; matches --rest-inner-light. */
      --workout-inner: #eef1f5;
      --workout-body-text: #e8e8e8;
      --workout-text-strong: #fafafa;
      --workout-ui: #d4d4d4;
      --workout-stepper-bg: rgba(255, 255, 255, 0.12);
      --workout-stepper-active: rgba(255, 255, 255, 0.2);
      --rest-page-bg: rgb(168, 176, 189);
      --rest-ring: #8c94a3;
      --rest-track: #e4e7ec;
      --rest-inner-light: #eef1f5;
      --rest-text: #1e293b;
      --rest-ui: #64748b;
    }

    html {
      background-color: var(--browser-ui-kettlebell);
      width: 100%;
      max-width: 100%;
      min-height: 100%;
      min-height: -webkit-fill-available;
      overflow: hidden;
      overflow-x: hidden;
      overscroll-behavior: none;
    }

    html:has(body.phase-rest) {
      background-color: var(--rest-page-bg);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    /* Body inset by safe areas; html background (--browser-ui-kettlebell) fills the outer strips. */
    body {
      margin: 0;
      width: 100%;
      max-width: 100%;
      min-height: 100%;
      min-height: -webkit-fill-available;
      overflow: hidden;
      overflow-x: hidden;
      overscroll-behavior: none;
      position: fixed;
      top: constant(safe-area-inset-top);
      right: constant(safe-area-inset-right);
      bottom: constant(safe-area-inset-bottom);
      left: constant(safe-area-inset-left);
      top: env(safe-area-inset-top, 0px);
      right: env(safe-area-inset-right, 0px);
      bottom: env(safe-area-inset-bottom, 0px);
      left: env(safe-area-inset-left, 0px);
      display: grid;
      place-items: center;
      font-family: Inter, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
      padding: 16px;
      box-sizing: border-box;
      /* No background transition: interpolating black → band color can flash greenish mid-tones. */
      transition: color 0.35s ease;
    }

    body.phase-workout {
      background: var(--kettlebell-black);
      color: var(--workout-body-text);
    }

    body.phase-rest {
      background: var(--rest-page-bg);
      color: var(--rest-ui);
    }

    .app {
      --dot-band: 80px;
      --dot-size: 4px;
      --dot-size-far: 2.6px;
      --dot-step-x: 50px;
      --dot-step-y: 50px;
      --dot-offset-x: 25px;
      --dot-offset-y: 25px;
      --dot-mask-fade: radial-gradient(
        circle at center,
        rgba(0, 0, 0, 1) 34%,
        rgba(0, 0, 0, 0.78) 62%,
        rgba(0, 0, 0, 0.38) 84%,
        transparent 100%
      );
      --dot-ring-mask: linear-gradient(#fff, #fff);
      position: relative;
      width: min(440px, 100%);
      display: grid;
      gap: 18px;
      /* stretch rows full width; center .timer explicitly (center + shrink-wrap mis-centers .controls) */
      justify-items: stretch;
      padding: 20px 20px 24px;
    }

    body.phase-workout .app {
      background: var(--kettlebell-black);
    }

    body.phase-rest .app {
      background: var(--rest-page-bg);
    }

    /* Invisible halo: same layer-promoting properties HEAD relied on (opacity < 1, mask-composite,
       80px-extended bounding box, z-index: -2) so Safari's compositing path matches the 17% baseline,
       but the dot gradients are fully transparent so nothing is painted. Removing this regresses CPU
       to ~40% in Safari Timeline. */
    body.phase-workout .app::before,
    body.phase-rest .app::before {
      content: "";
      position: absolute;
      inset: calc(-1 * var(--dot-band));
      z-index: -2;
      pointer-events: none;
      background:
        radial-gradient(
          circle at var(--dot-size) var(--dot-size),
          rgba(0, 0, 0, 0) calc(var(--dot-size) - 1px),
          transparent var(--dot-size)
        )
        var(--dot-offset-x) var(--dot-offset-y) / var(--dot-step-x) var(--dot-step-y),
        radial-gradient(
          circle at var(--dot-size-far) var(--dot-size-far),
          rgba(0, 0, 0, 0) calc(var(--dot-size-far) - 0.8px),
          transparent var(--dot-size-far)
        )
        var(--dot-offset-x) var(--dot-offset-y) / var(--dot-step-x) var(--dot-step-y);
      -webkit-mask-image: var(--dot-ring-mask), var(--dot-mask-fade);
      -webkit-mask-repeat: no-repeat, no-repeat;
      -webkit-mask-size: 100% 100%, 100% 100%;
      -webkit-mask-position: center, center;
      -webkit-mask-composite: source-in;
      mask-image: var(--dot-ring-mask), var(--dot-mask-fade);
      mask-repeat: no-repeat, no-repeat;
      mask-size: 100% 100%, 100% 100%;
      mask-position: center, center;
      mask-composite: intersect;
      opacity: 0.9;
    }

    .timer {
      width: min(380px, 100%);
      max-width: 100%;
      justify-self: center;
      aspect-ratio: 1 / 1;
      position: relative;
      display: grid;
      place-items: center;
      /* Limit style/layout invalidation to the timer subtree when the ring updates. */
      contain: layout style;
      /* Keep ring/ticks compositing scoped to reduce blend cost with sibling layers. */
      isolation: isolate;
    }

    .ring {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      position: absolute;
      contain: paint;
    }

    .ring-svg {
      position: absolute;
      inset: 0;
      z-index: 1;
      width: 100%;
      height: 100%;
      display: block;
      transform: translateZ(0);
    }

    .ring-track {
      fill: none;
      stroke: var(--track-color);
      stroke-width: 12;
    }

    .ring-prog {
      fill: none;
      stroke: var(--fill-color);
      stroke-width: 12;
      stroke-linecap: butt;
    }

    .ring::before {
      content: "";
      position: absolute;
      /* Disc edge meets the stroke's inner edge (r 44, stroke 12 → inner at viewBox 38 = 12% inset). */
      inset: 12%;
      border-radius: 50%;
      background: var(--inner-color);
      transform: rotate(90deg);
      z-index: 2;
    }

    .ticks {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      z-index: 3;
      background: repeating-conic-gradient(
        var(--tick) 0deg 1.2deg,
        transparent 1.2deg 30deg
      );
      -webkit-mask: radial-gradient(circle, transparent 57%, black 58%, black 68%, transparent 69%);
      mask: radial-gradient(circle, transparent 57%, black 58%, black 68%, transparent 69%);
      opacity: 0.95;
      pointer-events: none;
    }

    .center {
      position: relative;
      z-index: 4;
      width: 72%;
      aspect-ratio: 1 / 1;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-size: clamp(56px, 18vw, 74px);
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.04em;
      user-select: none;
      transition: color 160ms linear;
    }

    .meta {
      justify-self: center;
      width: 100%;
      text-align: center;
      font-size: 13px;
      letter-spacing: 0.12em;
      font-weight: 700;
      text-transform: uppercase;
      margin-top: -4px;
      min-height: 1em;
    }

    .controls {
      width: 100%;
      display: grid;
      gap: 10px;
    }

    .durations {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .durations > label {
      display: grid;
      gap: 6px;
      justify-items: center;
      text-align: center;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
    }

    .durations > label .field-stepper {
      width: 100%;
    }

    .field-stepper {
      display: flex;
      align-items: stretch;
      width: 100%;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.6);
      background: rgba(255, 255, 255, 0.8);
      overflow: hidden;
    }

    .field-stepper input[type="number"] {
      flex: 1;
      width: 100%;
      min-width: 0;
      border: none;
      background: transparent;
      border-radius: 0;
      padding: 10px 6px;
      font-size: 16px;
      font-weight: 600;
      color: #1f2a40;
      text-align: center;
      touch-action: manipulation;
      appearance: textfield;
      -moz-appearance: textfield;
    }

    .field-stepper input[type="number"]::-webkit-outer-spin-button,
    .field-stepper input[type="number"]::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .stepper-btn {
      flex: 0 0 auto;
      min-width: 44px;
      min-height: 44px;
      padding: 0 10px;
      border: none;
      border-radius: 0;
      font-size: 22px;
      font-weight: 700;
      line-height: 1;
      cursor: pointer;
      background: rgba(31, 42, 64, 0.08);
      color: #1f2a40;
      touch-action: manipulation;
    }

    .stepper-btn:active {
      background: rgba(31, 42, 64, 0.14);
    }

    .field-stepper input:disabled {
      cursor: not-allowed;
    }

    .stepper-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .buttons {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .buttons button {
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.04em;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.86);
      color: #1f2a40;
      min-width: 96px;
      min-height: 44px;
      touch-action: manipulation;
    }

    .buttons button:hover {
      background: rgba(255, 255, 255, 0.97);
    }

    .workout {
      --fill-color: var(--workout-accent);
      --track-color: rgba(255, 255, 255, 0.48);
      --inner-color: var(--workout-inner);
      --tick: rgba(255, 255, 255, 0.96);
    }

    /* Rest: light ring stack (screenshot: pale track, blue-gray progress, white ticks). */
    body.phase-rest .timer.workout {
      --fill-color: var(--rest-ring);
      --track-color: var(--rest-track);
      --inner-color: var(--rest-inner-light);
      --tick: rgba(255, 255, 255, 0.98);
    }

    body.phase-rest .ticks {
      opacity: 1;
    }

    .workout .center {
      color: var(--workout-text-strong);
    }

    body.phase-rest .timer.workout .center {
      color: var(--rest-text);
    }

    body.phase-workout .meta {
      color: var(--workout-ui);
    }

    body.phase-rest .meta {
      color: var(--rest-ui);
    }

    body.phase-workout .durations > label {
      color: var(--workout-ui);
    }

    body.phase-rest .durations > label {
      color: var(--rest-ui);
    }

    body.phase-workout .field-stepper {
      border-color: rgba(255, 255, 255, 0.14);
      background: rgba(255, 255, 255, 0.06);
    }

    body.phase-rest .field-stepper {
      border: 1px solid rgba(255, 255, 255, 0.85);
      background: rgba(255, 255, 255, 0.95);
    }

    body.phase-workout .stepper-btn {
      background: var(--workout-stepper-bg);
      color: #ffffff;
    }

    body.phase-workout .stepper-btn:active {
      background: var(--workout-stepper-active);
    }

    body.phase-rest .stepper-btn {
      background: rgba(30, 41, 59, 0.06);
      color: var(--rest-text);
    }

    body.phase-rest .stepper-btn:active {
      background: rgba(30, 41, 59, 0.11);
    }

    /* Duration values: before start = same as Start; after start = same as center counter. */
    body.phase-workout:not(.has-started) .durations > label:first-child input[type="number"],
    body.phase-workout:not(.has-started) .durations > label:nth-child(2) input[type="number"],
    body.phase-workout:not(.has-started) #workoutInput,
    body.phase-workout:not(.has-started) #restInput {
      color: var(--workout-accent);
      -webkit-text-fill-color: var(--workout-accent);
    }

    body.phase-rest:not(.has-started) .durations > label:first-child input[type="number"],
    body.phase-rest:not(.has-started) .durations > label:nth-child(2) input[type="number"],
    body.phase-rest:not(.has-started) #workoutInput,
    body.phase-rest:not(.has-started) #restInput {
      color: var(--rest-text);
      -webkit-text-fill-color: var(--rest-text);
    }

    body.phase-workout.has-started .durations > label:first-child input[type="number"]:disabled,
    body.phase-workout.has-started .durations > label:nth-child(2) input[type="number"]:disabled,
    body.phase-workout.has-started #workoutInput:disabled,
    body.phase-workout.has-started #restInput:disabled {
      color: var(--workout-text-strong);
      -webkit-text-fill-color: var(--workout-text-strong);
    }

    body.phase-rest.has-started .durations > label:first-child input[type="number"]:disabled,
    body.phase-rest.has-started .durations > label:nth-child(2) input[type="number"]:disabled,
    body.phase-rest.has-started #workoutInput:disabled,
    body.phase-rest.has-started #restInput:disabled {
      color: var(--rest-text);
      -webkit-text-fill-color: var(--rest-text);
    }

    body.has-started .field-stepper input[type="number"]:disabled {
      opacity: 1;
    }

    body.phase-workout .buttons button {
      background: rgba(255, 255, 255, 0.94);
      color: var(--workout-accent);
    }

    body.phase-workout .buttons button:hover {
      background: #ffffff;
    }

    body.phase-rest .buttons button {
      background: #ffffff;
      color: var(--rest-text);
    }

    body.phase-rest .buttons button:hover {
      background: #f8fafc;
    }

    @media (max-width: 480px) {
      .app {
        gap: 14px;
        padding: 14px 14px 18px;
      }

      .timer {
        width: min(94%, 320px);
      }

      .center {
        font-size: clamp(52px, 20vw, 72px);
      }

      .durations {
        gap: 8px;
      }

      .buttons button {
        flex: 1 1 30%;
      }
    }
  </style>
</head>
<body class="phase-workout">
  <main class="app">
    <section id="timer" class="timer workout">
      <div class="ring" id="ring">
        <svg class="ring-svg" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
          <circle class="ring-track" cx="50" cy="50" r="44" />
          <circle
            class="ring-prog"
            id="ringProgress"
            cx="50"
            cy="50"
            r="44"
            transform="rotate(-90 50 50)"
          />
        </svg>
      </div>
      <div class="ticks"></div>
      <div class="center" id="seconds">40</div>
    </section>
    <div class="meta" id="phaseLabel">Workout</div>

    <section class="controls">
      <div class="durations">
        <label>
          Workout (sec)
          <div class="field-stepper">
            <button type="button" class="stepper-btn" id="workoutMinus" aria-label="Decrease workout by 5 seconds">−</button>
            <input id="workoutInput" type="number" min="5" value="40" inputmode="numeric" />
            <button type="button" class="stepper-btn" id="workoutPlus" aria-label="Increase workout by 5 seconds">+</button>
          </div>
        </label>
        <label>
          Rest (sec)
          <div class="field-stepper">
            <button type="button" class="stepper-btn" id="restMinus" aria-label="Decrease rest by 5 seconds">−</button>
            <input id="restInput" type="number" min="5" value="20" inputmode="numeric" />
            <button type="button" class="stepper-btn" id="restPlus" aria-label="Increase rest by 5 seconds">+</button>
          </div>
        </label>
      </div>
      <div class="buttons">
        <button id="startBtn" type="button">Start</button>
        <button id="resetBtn" type="button">Reset</button>
      </div>
    </section>
  </main>

  <script>
    const timerEl = document.getElementById("timer");
    const ringProgressEl = document.getElementById("ringProgress");
    const RING_LEN = 2 * Math.PI * 44;
    ringProgressEl.setAttribute("stroke-dasharray", `${RING_LEN} ${RING_LEN}`);
    ringProgressEl.style.strokeDashoffset = String(RING_LEN);
    const secondsEl = document.getElementById("seconds");
    const phaseLabelEl = document.getElementById("phaseLabel");
    const workoutInput = document.getElementById("workoutInput");
    const restInput = document.getElementById("restInput");
    const startBtn = document.getElementById("startBtn");
    const resetBtn = document.getElementById("resetBtn");
    const workoutMinus = document.getElementById("workoutMinus");
    const workoutPlus = document.getElementById("workoutPlus");
    const restMinus = document.getElementById("restMinus");
    const restPlus = document.getElementById("restPlus");

    const PHASE_WORKOUT = "workout";
    const PHASE_REST = "rest";
    const MIN_DURATION_SEC = 5;
    /** Black until first paint after load; then one random palette entry (refresh only). */
    const WORKOUT_BOOT_PLACEHOLDER_HEX = "#000000";

    const WORKOUT_BAND_PALETTE = [
      "#ff69b4",
      "#2187f3",
      "#ffcb00",
      "#9d84cb",
      "#2c9323",
      "#fd6f37",
      "#ff0024",
    ];
    let workoutPaletteIndex = null;

    function normalizeHex(hex) {
      return String(hex || "")
        .trim()
        .replace(/^#/, "")
        .toLowerCase();
    }

    function canonicalBandHex(hex) {
      const n = normalizeHex(hex);
      return n.length === 6 ? `#${n}` : String(hex);
    }

    function hexToRgb(hex) {
      const h = hex.replace("#", "");
      return {
        r: Number.parseInt(h.slice(0, 2), 16),
        g: Number.parseInt(h.slice(2, 4), 16),
        b: Number.parseInt(h.slice(4, 6), 16),
      };
    }

    function rgbToHex(r, g, b) {
      return `#${[r, g, b]
        .map((x) => {
          const n = Math.round(Math.max(0, Math.min(255, x)));
          const s = n.toString(16);
          return s.length === 1 ? `0${s}` : s;
        })
        .join("")}`;
    }

    function blendHex(bg, fg, t) {
      const A = hexToRgb(bg);
      const B = hexToRgb(fg);
      return rgbToHex(
        A.r + (B.r - A.r) * t,
        A.g + (B.g - A.g) * t,
        A.b + (B.b - A.b) * t
      );
    }

    const KETTLEBELL_PAGE_HEX = "#1a1817";

    function syncBrowserChrome() {
      document.documentElement.style.setProperty("--browser-ui-kettlebell", KETTLEBELL_PAGE_HEX);

      function upsertThemeColor(mediaAttr) {
        const metas = [...document.head.querySelectorAll('meta[name="theme-color"]')];
        const match = (m) =>
          mediaAttr == null ? !m.hasAttribute("media") : m.getAttribute("media") === mediaAttr;
        let el = metas.find(match);
        if (!el) {
          el = document.createElement("meta");
          el.setAttribute("name", "theme-color");
          if (mediaAttr != null) el.setAttribute("media", mediaAttr);
          document.head.appendChild(el);
        }
        el.setAttribute("content", KETTLEBELL_PAGE_HEX);
      }

      upsertThemeColor(null);
      upsertThemeColor("(prefers-color-scheme: light)");
      upsertThemeColor("(prefers-color-scheme: dark)");
    }

    function pickRandomWorkoutIndex(excludeIdx) {
      const n = WORKOUT_BAND_PALETTE.length;
      if (!Number.isInteger(excludeIdx) || excludeIdx < 0 || excludeIdx >= n) {
        return Math.floor(Math.random() * n);
      }
      if (n <= 1) return 0;
      let j = Math.floor(Math.random() * (n - 1));
      if (j >= excludeIdx) j += 1;
      return j;
    }

    function applyWorkoutThemeFromHex(hex, knownIndex = null) {
      const canonical = canonicalBandHex(hex);
      const { r, g, b } = hexToRgb(canonical);
      const idx = Number.isInteger(knownIndex) ? knownIndex : WORKOUT_BAND_PALETTE.indexOf(canonical);
      workoutPaletteIndex = idx >= 0 ? idx : workoutPaletteIndex;
      const root = document.documentElement;
      root.style.setProperty("--workout-accent", canonical);
      root.style.setProperty("--workout-accent-rgb", `${r} ${g} ${b}`);
      root.style.setProperty("--workout-body-text", blendHex("#0f172a", canonical, 0.1));
      root.style.setProperty("--workout-text-strong", blendHex("#0f172a", canonical, 0.45));
      root.style.setProperty("--workout-ui", blendHex("#0f172a", canonical, 0.32));
      root.style.setProperty("--workout-stepper-bg", `rgba(${r},${g},${b},0.2)`);
      root.style.setProperty("--workout-stepper-active", `rgba(${r},${g},${b},0.34)`);
      syncBrowserChrome();
    }

    function scheduleWorkoutThemeReveal(applyReal) {
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          applyReal();
          updateUI();
        });
      });
    }

    function getInputValue(input, fallback) {
      const value = Number.parseInt(input.value, 10);
      return Number.isFinite(value) && value >= MIN_DURATION_SEC ? value : fallback;
    }

    /** Hidden-tab cadence; visible mode uses requestAnimationFrame for display-synced ring motion. */
    const HIDDEN_TICK_MS = 1000;

    let phase = PHASE_WORKOUT;
    let phaseDuration = getInputValue(workoutInput, 40);
    let remaining = phaseDuration;
    let running = false;
    let timerTickId = null;
    let rafId = null;
    let endTimeMs = 0;
    /** Avoid rewriting `secondsEl` when the displayed integer has not changed. */
    let lastRenderedCeilSec = null;
    /** Skip redundant `strokeDashoffset` writes when quantized value unchanged (fewer style commits). */
    let lastRingDashKey = null;
    let audioCtx = null;
    const beepBufferCache = new Map();
    let beepedSecond = null;
    let wakeLock = null;
    let hasStarted = false;

    function updateStartButton() {
      document.body.classList.toggle("has-started", hasStarted);
      if (!hasStarted) {
        startBtn.textContent = "Start";
      } else if (running) {
        startBtn.textContent = "Pause";
      } else {
        startBtn.textContent = "Resume";
      }
    }

    function updateDurationControlsLock() {
      const locked = hasStarted;
      workoutInput.disabled = locked;
      restInput.disabled = locked;
      workoutMinus.disabled = locked;
      workoutPlus.disabled = locked;
      restMinus.disabled = locked;
      restPlus.disabled = locked;
    }

    async function acquireWakeLock() {
      if (!("wakeLock" in navigator)) return;
      try {
        if (wakeLock && !wakeLock.released) return;
        wakeLock = await navigator.wakeLock.request("screen");
        wakeLock.addEventListener("release", () => {
          wakeLock = null;
        });
      } catch {
        wakeLock = null;
      }
    }

    async function releaseWakeLock() {
      if (!wakeLock) return;
      try {
        await wakeLock.release();
      } catch {
        /* ignore */
      }
      wakeLock = null;
    }

    function applyDurationInputChange(input) {
      if (hasStarted) return;
      if (input === workoutInput && phase === PHASE_WORKOUT && !running) {
        setPhase(PHASE_WORKOUT);
      }
      if (input === restInput && phase === PHASE_REST && !running) {
        setPhase(PHASE_REST);
      }
    }

    function stepDuration(input, delta) {
      if (hasStarted) return;
      const fallback = input === workoutInput ? 40 : 20;
      let next = getInputValue(input, fallback) + delta;
      if (next < MIN_DURATION_SEC) next = MIN_DURATION_SEC;
      input.value = String(next);
      applyDurationInputChange(input);
    }

    function ensureAudioContext() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      return audioCtx;
    }

    function beep(duration, frequency, gain, fadeOut) {
      const ctx = ensureAudioContext();

      const play = () => {
        if (ctx.state !== "running") return;
        const sr = ctx.sampleRate;
        const attack = 0.008;
        const release = fadeOut ? 0.08 : 0.016;
        const key = [duration, frequency, gain, fadeOut].join("|");
        let buffer = beepBufferCache.get(key);

        if (!buffer) {
          const sampleCount = Math.max(1, Math.floor(duration * sr));
          buffer = ctx.createBuffer(1, sampleCount, sr);
          const data = buffer.getChannelData(0);
          const attackSamples = Math.max(1, Math.floor(attack * sr));
          const releaseSamples = Math.max(1, Math.floor(release * sr));
          const sustainEnd = Math.max(0, sampleCount - releaseSamples);
          const twoPiF = 2 * Math.PI * frequency;

          for (let i = 0; i < sampleCount; i += 1) {
            let env = 1;
            if (i < attackSamples) {
              env = i / attackSamples;
            } else if (i >= sustainEnd) {
              env = (sampleCount - 1 - i) / releaseSamples;
            }
            env = Math.max(0, Math.min(1, env));
            data[i] = Math.sin((twoPiF * i) / sr) * gain * env;
          }
          data[0] = 0;
          data[sampleCount - 1] = 0;
          beepBufferCache.set(key, buffer);
        }

        const src = ctx.createBufferSource();
        src.buffer = buffer;
        src.connect(ctx.destination);
        src.start(ctx.currentTime + 0.003);
      };

      if (ctx.state === "running") {
        play();
        return;
      }
      void ctx.resume().then(play);
    }

    function setPhase(nextPhase) {
      phase = nextPhase;
      phaseDuration = phase === PHASE_WORKOUT
        ? getInputValue(workoutInput, 40)
        : getInputValue(restInput, 20);
      remaining = phaseDuration;
      beepedSecond = null;
      updateUI();
    }

    function switchPhase() {
      const next = phase === PHASE_WORKOUT ? PHASE_REST : PHASE_WORKOUT;
      if (next === PHASE_WORKOUT) {
        const nextIdx = pickRandomWorkoutIndex(workoutPaletteIndex);
        applyWorkoutThemeFromHex(WORKOUT_BAND_PALETTE[nextIdx], nextIdx);
      }
      setPhase(next);
      if (running) {
        endTimeMs = performance.now() + remaining * 1000;
      }
    }

    function syncPhaseChrome() {
      timerEl.classList.add("workout");
      document.body.classList.toggle("phase-workout", phase === PHASE_WORKOUT);
      document.body.classList.toggle("phase-rest", phase === PHASE_REST);
      const label = phase === PHASE_WORKOUT ? "Workout" : "Rest";
      if (phaseLabelEl.textContent !== label) {
        phaseLabelEl.textContent = label;
      }
    }

    function syncRingFromRemaining() {
      const doneRatio = 1 - (remaining / phaseDuration);
      const p = Math.max(0, Math.min(1, doneRatio));
      const off = RING_LEN * (1 - p);
      const key = off.toFixed(2);
      if (key === lastRingDashKey) return;
      lastRingDashKey = key;
      ringProgressEl.style.strokeDashoffset = key;
    }

    function updateUI() {
      syncPhaseChrome();
      const shown = Math.max(0, Math.ceil(remaining));
      secondsEl.textContent = String(shown);
      lastRenderedCeilSec = shown;
      lastRingDashKey = null;
      syncRingFromRemaining();
    }

    function clearScheduler() {
      if (timerTickId !== null) {
        clearTimeout(timerTickId);
        timerTickId = null;
      }
      if (rafId !== null) {
        cancelAnimationFrame(rafId);
        rafId = null;
      }
    }

    function finishPhase() {
      beep(0.7, 990, 0.16, false);
      switchPhase();
      if (running) {
        scheduleNextTick();
      }
    }

    function tick() {
      if (!running) return;
      const now = performance.now();
      remaining = Math.max(0, (endTimeMs - now) / 1000);
      const shown = Math.max(0, Math.ceil(remaining));

      if (shown !== beepedSecond) {
        if (shown >= 1 && shown <= 3) {
          beep(0.25, 990, 0.16, true);
        }
        beepedSecond = shown;
      }

      syncRingFromRemaining();
      if (shown !== lastRenderedCeilSec) {
        secondsEl.textContent = String(shown);
        lastRenderedCeilSec = shown;
      }

      if (remaining <= 0) {
        finishPhase();
        return;
      }

      if (!running) return;
      scheduleNextTick();
    }

    function scheduleNextTick() {
      if (!running) return;
      if (document.hidden) {
        const msLeft = endTimeMs - performance.now();
        const delay = msLeft <= 0 ? 0 : Math.min(HIDDEN_TICK_MS, Math.max(8, msLeft));
        timerTickId = setTimeout(tick, delay);
        return;
      }
      rafId = requestAnimationFrame(() => {
        rafId = null;
        tick();
      });
    }

    function startTimer() {
      if (running) return;
      hasStarted = true;
      running = true;
      const ctx = ensureAudioContext();
      void acquireWakeLock();
      updateStartButton();
      updateDurationControlsLock();
      void ctx.resume().then(() => {
        if (!running) return;
        endTimeMs = performance.now() + remaining * 1000;
        clearScheduler();
        scheduleNextTick();
      });
    }

    function pauseTimer() {
      if (!running) return;
      remaining = Math.max(0, (endTimeMs - performance.now()) / 1000);
      running = false;
      void releaseWakeLock();
      clearScheduler();
      lastRingDashKey = null;
      syncRingFromRemaining();
      const shown = Math.max(0, Math.ceil(remaining));
      secondsEl.textContent = String(shown);
      lastRenderedCeilSec = shown;
      if (audioCtx && audioCtx.state === "running") {
        void audioCtx.suspend();
      }
      updateStartButton();
    }

    function resetTimer() {
      pauseTimer();
      hasStarted = false;
      setPhase(PHASE_WORKOUT);
      updateStartButton();
      updateDurationControlsLock();
    }

    function toggleStartPause() {
      if (running) {
        pauseTimer();
      } else {
        startTimer();
      }
    }

    window.addEventListener("pageshow", () => {
      if (running) {
        void acquireWakeLock();
        if (audioCtx) void audioCtx.resume();
        remaining = Math.max(0, (endTimeMs - performance.now()) / 1000);
        clearScheduler();
        scheduleNextTick();
      }
    });

    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "visible") {
        if (running) {
          void acquireWakeLock();
          if (audioCtx) void audioCtx.resume();
          remaining = Math.max(0, (endTimeMs - performance.now()) / 1000);
          clearScheduler();
          scheduleNextTick();
        }
      } else if (running) {
        void releaseWakeLock();
        clearScheduler();
        scheduleNextTick();
      }
    });

    startBtn.addEventListener("click", toggleStartPause);
    resetBtn.addEventListener("click", resetTimer);

    workoutInput.addEventListener("change", () => applyDurationInputChange(workoutInput));
    restInput.addEventListener("change", () => applyDurationInputChange(restInput));

    workoutMinus.addEventListener("click", () => stepDuration(workoutInput, -5));
    workoutPlus.addEventListener("click", () => stepDuration(workoutInput, 5));
    restMinus.addEventListener("click", () => stepDuration(restInput, -5));
    restPlus.addEventListener("click", () => stepDuration(restInput, 5));

    const initialIdx = Math.floor(Math.random() * WORKOUT_BAND_PALETTE.length);
    applyWorkoutThemeFromHex(WORKOUT_BOOT_PLACEHOLDER_HEX);
    updateUI();
    updateStartButton();
    updateDurationControlsLock();
    scheduleWorkoutThemeReveal(() => {
      applyWorkoutThemeFromHex(WORKOUT_BAND_PALETTE[initialIdx], initialIdx);
    });
  </script>
</body>
</html>
