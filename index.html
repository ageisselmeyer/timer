<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- Kettlebell black background visible immediately; #app hidden until viewport lock + fade-in. -->
  <style>
    html {
      background-color: #181818;
      color-scheme: dark;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      margin: 0;
      position: fixed;
      inset: 0;
      width: 100%;
      background-color: #181818;
      overflow: hidden;
    }
    .app {
      visibility: hidden;
      opacity: 0;
    }
  </style>
  <script>
    if (
      window.matchMedia("(display-mode: standalone)").matches ||
      window.matchMedia("(display-mode: fullscreen)").matches ||
      window.navigator.standalone
    ) {
      document.documentElement.classList.add("standalone");
    }
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="color-scheme" content="dark" />
  <meta name="theme-color" content="#181818" />
  <meta name="description" content="A simple workout and rest interval timer." />
  <meta name="application-name" content="Workout Timer" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Workout Timer" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <title>Workout Timer</title>
  <link rel="stylesheet" href="theme.css" />
</head>
<body class="phase-workout">
  <div id="app" class="app">
    <header class="app-header">
      <div class="meta" id="phaseLabel">Workout</div>
    </header>

    <main class="app-scroll">
      <div class="timer-area">
        <section id="timer" class="timer workout">
          <div class="ring" id="ring">
            <svg class="ring-svg" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
              <circle class="ring-track" cx="50" cy="50" r="44" />
              <circle
                class="ring-prog"
                id="ringProgress"
                cx="50"
                cy="50"
                r="44"
                transform="rotate(-90 50 50)"
              />
            </svg>
          </div>
          <div class="ticks"></div>
          <div class="center" id="seconds">30</div>
        </section>
      </div>
    </main>

    <nav class="bottom-bar" aria-label="Timer controls">
      <div class="durations">
        <label>
          Workout (sec)
          <div class="field-stepper">
            <button type="button" class="stepper-btn" id="workoutMinus" aria-label="Decrease workout by 5 seconds">−</button>
            <input id="workoutInput" type="number" min="5" value="30" inputmode="numeric" />
            <button type="button" class="stepper-btn" id="workoutPlus" aria-label="Increase workout by 5 seconds">+</button>
          </div>
        </label>
        <label>
          Rest (sec)
          <div class="field-stepper">
            <button type="button" class="stepper-btn" id="restMinus" aria-label="Decrease rest by 5 seconds">−</button>
            <input id="restInput" type="number" min="5" value="30" inputmode="numeric" />
            <button type="button" class="stepper-btn" id="restPlus" aria-label="Increase rest by 5 seconds">+</button>
          </div>
        </label>
      </div>
      <div class="buttons">
        <button id="startBtn" type="button">Start</button>
        <button id="resetBtn" type="button">Reset</button>
      </div>
    </nav>
  </div>

  <script src="app.js"></script>
</body>
</html>
