<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#e4e6ec" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta id="appleStatusBarMeta" name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Workout Timer</title>
  <style>
    :root {
      --text: #111;
      /* Shown in safe areas (status bar / home indicator); body phase color is inset so this stays visible. */
      --browser-ui-kettlebell: #e4e6ec;
      --pause-bg: #a8b0bd;
      /* Pre-JS: black boot matches first script frame (then random kettlebell). Avoids a green flash before JS. */
      --workout-accent: #000000;
      --workout-inner: #1a1a1a;
      --workout-body-text: #e8e8e8;
      --workout-text-strong: #fafafa;
      --workout-ui: #d4d4d4;
      --workout-stepper-bg: rgba(255, 255, 255, 0.12);
      --workout-stepper-active: rgba(255, 255, 255, 0.2);
      --workout-disabled: rgba(255, 255, 255, 0.35);
      --workout-shadow: rgba(0, 0, 0, 0.45);
    }

    html {
      background-color: var(--browser-ui-kettlebell);
      width: 100%;
      min-height: 100%;
      overflow: hidden;
      overscroll-behavior: none;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    /*
      Do NOT use inset:0 — body would cover the full viewport and system UI samples the phase color.
      Inset the body by safe areas so only html’s --browser-ui-kettlebell shows in those outer strips.
    */
    body {
      margin: 0;
      overflow: hidden;
      overscroll-behavior: none;
      position: fixed;
      top: constant(safe-area-inset-top);
      right: constant(safe-area-inset-right);
      bottom: constant(safe-area-inset-bottom);
      left: constant(safe-area-inset-left);
      top: env(safe-area-inset-top, 0px);
      right: env(safe-area-inset-right, 0px);
      bottom: env(safe-area-inset-bottom, 0px);
      left: env(safe-area-inset-left, 0px);
      display: grid;
      place-items: center;
      font-family: Inter, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
      padding: 16px;
      box-sizing: border-box;
      /* No background transition: interpolating black → band color can flash greenish mid-tones. */
      transition: color 0.35s ease;
    }

    body.phase-workout {
      background: var(--workout-accent);
      color: var(--workout-body-text);
    }

    body.phase-pause {
      background: var(--pause-bg);
      color: #1e293b;
    }

    .app {
      width: min(440px, 100%);
      display: grid;
      gap: 18px;
      justify-items: center;
      backdrop-filter: blur(8px);
      border-radius: 18px;
      padding: 20px 20px 24px;
      transition:
        background 0.45s ease,
        border-color 0.35s ease,
        box-shadow 0.45s ease;
    }

    body.phase-workout .app {
      background: rgba(255, 255, 255, 0.48);
      border: 1px solid rgba(255, 255, 255, 0.55);
      box-shadow: 0 14px 44px var(--workout-shadow);
    }

    body.phase-pause .app {
      background: rgba(255, 255, 255, 0.52);
      border: 1px solid rgba(255, 255, 255, 0.7);
      box-shadow: 0 14px 40px rgba(30, 41, 59, 0.14);
    }

    .timer {
      width: min(340px, 78vw);
      aspect-ratio: 1 / 1;
      position: relative;
      display: grid;
      place-items: center;
    }

    .ring {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      position: absolute;
      background:
        conic-gradient(
          var(--fill-color) calc(var(--progress, 0) * 1turn),
          var(--track-color) 0
        );
    }

    .ring::before {
      content: "";
      position: absolute;
      inset: 11%;
      border-radius: 50%;
      background: var(--inner-color);
      transform: rotate(90deg);
      z-index: 2;
    }

    .ticks {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      z-index: 3;
      background: repeating-conic-gradient(
        var(--tick) 0deg 1.2deg,
        transparent 1.2deg 30deg
      );
      -webkit-mask: radial-gradient(circle, transparent 57%, black 58%, black 68%, transparent 69%);
      mask: radial-gradient(circle, transparent 57%, black 58%, black 68%, transparent 69%);
      opacity: 0.95;
      pointer-events: none;
    }

    .center {
      position: relative;
      z-index: 4;
      width: 72%;
      aspect-ratio: 1 / 1;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-size: clamp(56px, 18vw, 74px);
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.04em;
      user-select: none;
      transition: color 160ms linear;
    }

    .meta {
      text-align: center;
      font-size: 13px;
      letter-spacing: 0.12em;
      font-weight: 700;
      text-transform: uppercase;
      margin-top: -4px;
      min-height: 1em;
    }

    .controls {
      width: 100%;
      display: grid;
      gap: 10px;
    }

    .durations {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .durations > label {
      display: grid;
      gap: 6px;
      justify-items: center;
      text-align: center;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
    }

    .durations > label .field-stepper {
      width: 100%;
    }

    .field-stepper {
      display: flex;
      align-items: stretch;
      width: 100%;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.6);
      background: rgba(255, 255, 255, 0.8);
      overflow: hidden;
    }

    .field-stepper input[type="number"] {
      flex: 1;
      width: 100%;
      min-width: 0;
      border: none;
      background: transparent;
      border-radius: 0;
      padding: 10px 6px;
      font-size: 16px;
      font-weight: 600;
      color: #1f2a40;
      text-align: center;
      touch-action: manipulation;
      appearance: textfield;
      -moz-appearance: textfield;
    }

    .field-stepper input[type="number"]::-webkit-outer-spin-button,
    .field-stepper input[type="number"]::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .stepper-btn {
      flex: 0 0 auto;
      min-width: 44px;
      min-height: 44px;
      padding: 0 10px;
      border: none;
      border-radius: 0;
      font-size: 22px;
      font-weight: 700;
      line-height: 1;
      cursor: pointer;
      background: rgba(31, 42, 64, 0.08);
      color: #1f2a40;
      touch-action: manipulation;
    }

    .stepper-btn:active {
      background: rgba(31, 42, 64, 0.14);
    }

    .field-stepper input:disabled {
      color: #5a6578;
      cursor: not-allowed;
    }

    .stepper-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .buttons {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .buttons button {
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.04em;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.86);
      color: #1f2a40;
      min-width: 96px;
      min-height: 44px;
      touch-action: manipulation;
    }

    .buttons button:hover {
      background: rgba(255, 255, 255, 0.97);
    }

    .workout {
      --fill-color: var(--workout-accent);
      --track-color: rgba(255, 255, 255, 0.48);
      --inner-color: var(--workout-inner);
      --tick: rgba(255, 255, 255, 0.96);
    }

    .pause {
      --fill-color: #8b939e;
      --track-color: rgba(255, 255, 255, 0.52);
      --inner-color: #c4c9d4;
      --tick: rgba(255, 255, 255, 0.92);
    }

    .workout .center {
      color: var(--workout-text-strong);
    }

    .pause .center {
      color: #1e293b;
    }

    body.phase-workout .meta {
      color: var(--workout-ui);
    }

    body.phase-pause .meta {
      color: #475569;
    }

    body.phase-workout .durations > label {
      color: var(--workout-ui);
    }

    body.phase-pause .durations > label {
      color: #64748b;
    }

    body.phase-workout .field-stepper {
      border-color: rgba(255, 255, 255, 0.65);
      background: rgba(255, 255, 255, 0.88);
    }

    body.phase-workout .field-stepper input[type="number"] {
      color: #0f172a;
    }

    body.phase-workout .stepper-btn {
      background: var(--workout-stepper-bg);
      color: var(--workout-ui);
    }

    body.phase-workout .stepper-btn:active {
      background: var(--workout-stepper-active);
    }

    body.phase-pause .field-stepper {
      border-color: rgba(255, 255, 255, 0.75);
      background: rgba(255, 255, 255, 0.82);
    }

    body.phase-pause .field-stepper input[type="number"] {
      color: #1e293b;
    }

    body.phase-pause .stepper-btn {
      background: rgba(71, 85, 105, 0.12);
      color: #475569;
    }

    body.phase-pause .stepper-btn:active {
      background: rgba(71, 85, 105, 0.2);
    }

    body.phase-workout .field-stepper input:disabled {
      color: var(--workout-disabled);
    }

    body.phase-pause .field-stepper input:disabled {
      color: rgba(30, 41, 59, 0.45);
    }

    body.phase-workout .buttons button {
      background: rgba(255, 255, 255, 0.94);
      color: var(--workout-accent);
    }

    body.phase-workout .buttons button:hover {
      background: #ffffff;
    }

    body.phase-pause .buttons button {
      background: rgba(255, 255, 255, 0.92);
      color: #475569;
    }

    body.phase-pause .buttons button:hover {
      background: #ffffff;
    }

    @media (max-width: 480px) {
      .app {
        gap: 14px;
        border-radius: 16px;
        padding: 14px 14px 18px;
      }

      .timer {
        width: min(82vw, 320px);
      }

      .center {
        font-size: clamp(52px, 20vw, 72px);
      }

      .durations {
        gap: 8px;
      }

      .buttons button {
        flex: 1 1 30%;
      }
    }
  </style>
  <script>
    (function () {
      var s = document.documentElement.style;
      s.setProperty("--workout-accent", "#000000");
      s.setProperty("--workout-inner", "#1a1a1a");
      s.setProperty("--workout-body-text", "#e8e8e8");
      s.setProperty("--workout-text-strong", "#fafafa");
      s.setProperty("--workout-ui", "#d4d4d4");
      s.setProperty("--workout-stepper-bg", "rgba(255,255,255,0.12)");
      s.setProperty("--workout-stepper-active", "rgba(255,255,255,0.2)");
      s.setProperty("--workout-disabled", "rgba(255,255,255,0.35)");
      s.setProperty("--workout-shadow", "rgba(0,0,0,0.45)");
    })();
  </script>
</head>
<body class="phase-workout">
  <main class="app">
    <section id="timer" class="timer workout">
      <div class="ring" id="ring" style="--progress:0"></div>
      <div class="ticks"></div>
      <div class="center" id="seconds">40</div>
    </section>
    <div class="meta" id="phaseLabel">Workout</div>

    <section class="controls">
      <div class="durations">
        <label>
          Workout (sec)
          <div class="field-stepper">
            <button type="button" class="stepper-btn" id="workoutMinus" aria-label="Decrease workout by 5 seconds">−</button>
            <input id="workoutInput" type="number" min="5" value="40" inputmode="numeric" />
            <button type="button" class="stepper-btn" id="workoutPlus" aria-label="Increase workout by 5 seconds">+</button>
          </div>
        </label>
        <label>
          Pause (sec)
          <div class="field-stepper">
            <button type="button" class="stepper-btn" id="pauseMinus" aria-label="Decrease pause by 5 seconds">−</button>
            <input id="pauseInput" type="number" min="5" value="20" inputmode="numeric" />
            <button type="button" class="stepper-btn" id="pausePlus" aria-label="Increase pause by 5 seconds">+</button>
          </div>
        </label>
      </div>
      <div class="buttons">
        <button id="playBtn" type="button">Start</button>
        <button id="resetBtn" type="button">Reset</button>
      </div>
    </section>
  </main>

  <script>
    const timerEl = document.getElementById("timer");
    const ringEl = document.getElementById("ring");
    const secondsEl = document.getElementById("seconds");
    const phaseLabelEl = document.getElementById("phaseLabel");
    const workoutInput = document.getElementById("workoutInput");
    const pauseInput = document.getElementById("pauseInput");
    const playBtn = document.getElementById("playBtn");
    const resetBtn = document.getElementById("resetBtn");
    const workoutMinus = document.getElementById("workoutMinus");
    const workoutPlus = document.getElementById("workoutPlus");
    const pauseMinus = document.getElementById("pauseMinus");
    const pausePlus = document.getElementById("pausePlus");

    const PHASE_WORKOUT = "workout";
    const PHASE_PAUSE = "pause";
    const MIN_DURATION_SEC = 5;
    const BROWSER_UI_KETTLEBELL = "#e4e6ec";
    /** First paint = black workout; then `scheduleWorkoutThemeReveal` applies random (mobile chrome may sample the first). */
    const WORKOUT_BOOT_PLACEHOLDER_HEX = "#000000";

    const KETTLEBELL_WORKOUT_COLORS = [
      { kg: 8, hex: "#ff69b4" },
      { kg: 12, hex: "#2187f3" },
      { kg: 16, hex: "#ffd700" },
      { kg: 20, hex: "#9d84cb" },
      { kg: 24, hex: "#2c9323" },
      { kg: 28, hex: "#ff7800" },
      { kg: 32, hex: "#ff0000" },
    ];

    let workoutThemeHex = null;
    let workoutColorIndex = null;

    function normalizeHex(hex) {
      return String(hex || "")
        .trim()
        .replace(/^#/, "")
        .toLowerCase();
    }

    function canonicalBandHex(hex) {
      const n = normalizeHex(hex);
      return n.length === 6 ? `#${n}` : String(hex);
    }

    function hexToRgb(hex) {
      const h = hex.replace("#", "");
      return {
        r: Number.parseInt(h.slice(0, 2), 16),
        g: Number.parseInt(h.slice(2, 4), 16),
        b: Number.parseInt(h.slice(4, 6), 16),
      };
    }

    function rgbToHex(r, g, b) {
      return `#${[r, g, b]
        .map((x) => {
          const n = Math.round(Math.max(0, Math.min(255, x)));
          const s = n.toString(16);
          return s.length === 1 ? `0${s}` : s;
        })
        .join("")}`;
    }

    function blendHex(bg, fg, t) {
      const A = hexToRgb(bg);
      const B = hexToRgb(fg);
      return rgbToHex(
        A.r + (B.r - A.r) * t,
        A.g + (B.g - A.g) * t,
        A.b + (B.b - A.b) * t
      );
    }

    function normalizePaletteIndex(idx) {
      const n = KETTLEBELL_WORKOUT_COLORS.length;
      if (idx == null || idx === "") return null;
      const j = Number.parseInt(String(idx), 10);
      if (!Number.isFinite(j) || j !== Math.floor(j) || j < 0 || j >= n) return null;
      return j;
    }

    function resolvePaletteIndexFromThemeState() {
      const byIdx = normalizePaletteIndex(workoutColorIndex);
      if (byIdx !== null) return byIdx;
      const tn = normalizeHex(workoutThemeHex || "");
      if (tn.length !== 6) return null;
      const fi = KETTLEBELL_WORKOUT_COLORS.findIndex(
        (c) => normalizeHex(c.hex) === tn
      );
      return fi >= 0 ? fi : null;
    }

    /** Uniform in [0, n); if exclude is a valid palette index, never returns that index. */
    function pickUniformPaletteIndexNot(exclude) {
      const n = KETTLEBELL_WORKOUT_COLORS.length;
      const e = normalizePaletteIndex(exclude);
      if (e === null) {
        return Math.floor(Math.random() * n);
      }
      let j = Math.floor(Math.random() * (n - 1));
      if (j >= e) j += 1;
      return j;
    }

    function applyWorkoutThemeFromHex(hex, knownPaletteIndex) {
      const canonical = canonicalBandHex(hex);
      workoutThemeHex = canonical;
      const forced = normalizePaletteIndex(knownPaletteIndex);
      if (forced !== null) {
        workoutColorIndex = forced;
      } else {
        const found = KETTLEBELL_WORKOUT_COLORS.findIndex(
          (c) => normalizeHex(c.hex) === normalizeHex(canonical)
        );
        workoutColorIndex = found >= 0 ? found : null;
      }
      workoutColorIndex = normalizePaletteIndex(workoutColorIndex);
      const { r, g, b } = hexToRgb(canonical);
      const root = document.documentElement;
      root.style.setProperty("--workout-accent", canonical);
      root.style.setProperty("--workout-inner", blendHex("#ffffff", canonical, 0.14));
      root.style.setProperty("--workout-body-text", blendHex("#0f172a", canonical, 0.1));
      root.style.setProperty("--workout-text-strong", blendHex("#0f172a", canonical, 0.45));
      root.style.setProperty("--workout-ui", blendHex("#0f172a", canonical, 0.32));
      root.style.setProperty("--workout-stepper-bg", `rgba(${r},${g},${b},0.2)`);
      root.style.setProperty("--workout-stepper-active", `rgba(${r},${g},${b},0.34)`);
      root.style.setProperty("--workout-disabled", `rgba(${r},${g},${b},0.48)`);
      root.style.setProperty(
        "--workout-shadow",
        `rgba(${Math.round(r * 0.45)},${Math.round(g * 0.45)},${Math.round(b * 0.45)},0.38)`
      );
    }

    function scheduleWorkoutThemeReveal(applyReal) {
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          applyReal();
          updateUI();
        });
      });
    }

    function getInputValue(input, fallback) {
      const value = Number.parseInt(input.value, 10);
      return Number.isFinite(value) && value >= MIN_DURATION_SEC ? value : fallback;
    }

    let phase = PHASE_WORKOUT;
    let phaseDuration = getInputValue(workoutInput, 40);
    let remaining = phaseDuration;
    let running = false;
    let rafId = null;
    let endTimeMs = 0;
    let audioCtx = null;
    const beepBufferCache = new Map();
    let beepedSecond = null;
    let wakeLock = null;
    let hasStarted = false;

    function updatePlayButton() {
      if (!hasStarted) {
        playBtn.textContent = "Start";
      } else if (running) {
        playBtn.textContent = "Pause";
      } else {
        playBtn.textContent = "Resume";
      }
    }

    function updateDurationControlsLock() {
      const locked = hasStarted;
      workoutInput.disabled = locked;
      pauseInput.disabled = locked;
      workoutMinus.disabled = locked;
      workoutPlus.disabled = locked;
      pauseMinus.disabled = locked;
      pausePlus.disabled = locked;
    }

    async function acquireWakeLock() {
      if (!("wakeLock" in navigator)) return;
      try {
        if (wakeLock && !wakeLock.released) return;
        wakeLock = await navigator.wakeLock.request("screen");
        wakeLock.addEventListener("release", () => {
          wakeLock = null;
        });
      } catch {
        wakeLock = null;
      }
    }

    async function releaseWakeLock() {
      if (!wakeLock) return;
      try {
        await wakeLock.release();
      } catch {
        /* ignore */
      }
      wakeLock = null;
    }

    function applyDurationInputChange(input) {
      if (hasStarted) return;
      if (input === workoutInput && phase === PHASE_WORKOUT && !running) {
        setPhase(PHASE_WORKOUT);
      }
      if (input === pauseInput && phase === PHASE_PAUSE && !running) {
        setPhase(PHASE_PAUSE);
      }
    }

    function stepDuration(input, delta) {
      if (hasStarted) return;
      const fallback = input === workoutInput ? 40 : 20;
      let next = getInputValue(input, fallback) + delta;
      if (next < MIN_DURATION_SEC) next = MIN_DURATION_SEC;
      input.value = String(next);
      applyDurationInputChange(input);
    }

    function ensureAudioContext() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      return audioCtx;
    }

    function beep(duration = 0.12, frequency = 880, gain = 0.16, fadeOut = true) {
      const ctx = ensureAudioContext();
      const sr = ctx.sampleRate;
      const attack = 0.008;
      const release = fadeOut ? 0.08 : 0.016;
      const key = [duration, frequency, gain, attack, release, fadeOut].join("|");
      let buffer = beepBufferCache.get(key);

      if (!buffer) {
        const sampleCount = Math.max(1, Math.floor(duration * sr));
        buffer = ctx.createBuffer(1, sampleCount, sr);
        const data = buffer.getChannelData(0);
        const attackSamples = Math.max(1, Math.floor(attack * sr));
        const releaseSamples = Math.max(1, Math.floor(release * sr));
        const sustainEnd = Math.max(0, sampleCount - releaseSamples);
        const twoPiF = 2 * Math.PI * frequency;

        for (let i = 0; i < sampleCount; i += 1) {
          let env = 1;
          if (i < attackSamples) {
            env = i / attackSamples;
          } else if (i >= sustainEnd) {
            env = (sampleCount - 1 - i) / releaseSamples;
          }
          env = Math.max(0, Math.min(1, env));
          const t = i / sr;
          data[i] = Math.sin(twoPiF * t) * gain * env;
        }
        data[0] = 0;
        data[sampleCount - 1] = 0;
        beepBufferCache.set(key, buffer);
      }

      const src = ctx.createBufferSource();
      src.buffer = buffer;
      src.connect(ctx.destination);
      src.start(ctx.currentTime + 0.003);
    }

    function setPhase(nextPhase) {
      phase = nextPhase;
      phaseDuration = phase === PHASE_WORKOUT
        ? getInputValue(workoutInput, 40)
        : getInputValue(pauseInput, 20);
      remaining = phaseDuration;
      beepedSecond = null;
      updateUI();
    }

    function switchPhase() {
      const next = phase === PHASE_WORKOUT ? PHASE_PAUSE : PHASE_WORKOUT;
      /* Workout band color is chosen only on load and Reset — not each time pause ends. */
      setPhase(next);
      if (running) {
        endTimeMs = performance.now() + remaining * 1000;
      }
    }

    /** Fixed `theme-color` metas (html background comes from CSS `--browser-ui-kettlebell`). */
    function installFixedBrowserChrome() {
      const c = BROWSER_UI_KETTLEBELL;
      document.querySelectorAll('meta[name="theme-color"]').forEach((el) => el.remove());
      const makeMeta = (extra) => {
        const el = document.createElement("meta");
        el.setAttribute("name", "theme-color");
        el.setAttribute("content", c);
        if (extra) el.setAttribute("media", extra);
        return el;
      };
      document.head.prepend(makeMeta());
      for (const media of ["(prefers-color-scheme: light)", "(prefers-color-scheme: dark)"]) {
        document.head.appendChild(makeMeta(media));
      }
    }

    function updateUI() {
      timerEl.classList.toggle("workout", phase === PHASE_WORKOUT);
      timerEl.classList.toggle("pause", phase === PHASE_PAUSE);
      document.body.classList.toggle("phase-workout", phase === PHASE_WORKOUT);
      document.body.classList.toggle("phase-pause", phase === PHASE_PAUSE);
      const shown = Math.max(0, Math.ceil(remaining));
      secondsEl.textContent = String(shown);
      phaseLabelEl.textContent = phase === PHASE_WORKOUT ? "Workout" : "Pause";
      const doneRatio = 1 - (remaining / phaseDuration);
      ringEl.style.setProperty("--progress", String(Math.max(0, Math.min(1, doneRatio))));
    }

    function finishPhase() {
      beep(0.7, 990, 0.16, false);
      switchPhase();
      if (running) {
        rafId = requestAnimationFrame(tick);
      }
    }

    function tick(now) {
      if (!running) return;
      remaining = Math.max(0, (endTimeMs - now) / 1000);
      const shown = Math.ceil(remaining);

      if (shown !== beepedSecond) {
        if (shown >= 1 && shown <= 3) {
          beep(0.25, 990, 0.16);
        }
        beepedSecond = shown;
      }

      updateUI();

      if (remaining <= 0) {
        finishPhase();
        return;
      }

      rafId = requestAnimationFrame(tick);
    }

    function startTimer() {
      if (running) return;
      ensureAudioContext().resume();
      hasStarted = true;
      running = true;
      endTimeMs = performance.now() + remaining * 1000;
      void acquireWakeLock();
      updatePlayButton();
      updateDurationControlsLock();
      rafId = requestAnimationFrame(tick);
    }

    function pauseTimer() {
      if (!running) return;
      running = false;
      void releaseWakeLock();
      if (rafId !== null) {
        cancelAnimationFrame(rafId);
        rafId = null;
      }
      updatePlayButton();
    }

    function resetTimer() {
      pauseTimer();
      hasStarted = false;
      const resetIdx = pickUniformPaletteIndexNot(resolvePaletteIndexFromThemeState());
      applyWorkoutThemeFromHex(WORKOUT_BOOT_PLACEHOLDER_HEX, null);
      setPhase(PHASE_WORKOUT);
      updatePlayButton();
      updateDurationControlsLock();
      scheduleWorkoutThemeReveal(() => {
        applyWorkoutThemeFromHex(KETTLEBELL_WORKOUT_COLORS[resetIdx].hex, resetIdx);
      });
    }

    function togglePlayPause() {
      if (running) {
        pauseTimer();
      } else {
        startTimer();
      }
    }

    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "visible" && running) {
        void acquireWakeLock();
      }
    });

    playBtn.addEventListener("click", togglePlayPause);
    resetBtn.addEventListener("click", resetTimer);

    workoutInput.addEventListener("change", () => applyDurationInputChange(workoutInput));
    pauseInput.addEventListener("change", () => applyDurationInputChange(pauseInput));

    workoutMinus.addEventListener("click", () => stepDuration(workoutInput, -5));
    workoutPlus.addEventListener("click", () => stepDuration(workoutInput, 5));
    pauseMinus.addEventListener("click", () => stepDuration(pauseInput, -5));
    pausePlus.addEventListener("click", () => stepDuration(pauseInput, 5));

    const initialIdx = pickUniformPaletteIndexNot(null);
    installFixedBrowserChrome();
    applyWorkoutThemeFromHex(WORKOUT_BOOT_PLACEHOLDER_HEX, null);
    updateUI();
    updatePlayButton();
    updateDurationControlsLock();
    scheduleWorkoutThemeReveal(() => {
      applyWorkoutThemeFromHex(KETTLEBELL_WORKOUT_COLORS[initialIdx].hex, initialIdx);
    });
  </script>
</body>
</html>
